<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Founded — Story Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #141914;
      --sidebar-bg: #0f130f;
      --surface: #1b201b;
      --surface-2: #222822;
      --border: rgba(255,255,255,0.07);
      --border-2: rgba(255,255,255,0.12);
      --red: #FF3C3A;
      --red-dim: rgba(255,60,58,0.15);
      --red-border: rgba(255,60,58,0.25);
      --green: #4ade80;
      --white: #ffffff;
      --white-80: rgba(255,255,255,0.8);
      --white-60: rgba(255,255,255,0.6);
      --white-40: rgba(255,255,255,0.4);
      --white-20: rgba(255,255,255,0.2);
      --white-10: rgba(255,255,255,0.1);
      --white-06: rgba(255,255,255,0.06);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--white);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN ────────────────────────────────────── */
    #login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 100;
    }

    .login-card {
      width: 380px;
      padding: 48px 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .login-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .login-logo-dot {
      width: 8px;
      height: 8px;
      background: var(--red);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--white-40);
      margin-bottom: 40px;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white-40);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-field input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-field input:focus { border-color: var(--white-20); }
    .form-field input::placeholder { color: var(--white-20); }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.15s;
    }

    .login-btn:hover { opacity: 0.88; }

    .login-error {
      font-size: 12px;
      color: var(--red);
      margin-top: 14px;
      display: none;
      text-align: center;
    }

    /* ── DASHBOARD ────────────────────────────────── */
    #dashboard {
      display: none;
      height: 100vh;
    }

    #dashboard.visible {
      display: flex;
      flex-direction: row;
    }

    /* ── SIDEBAR ──────────────────────────────────── */
    #sidebar {
      width: 268px;
      min-width: 268px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 26px 22px 22px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-dot {
      width: 7px;
      height: 7px;
      background: var(--red);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-tagline {
      font-size: 11px;
      color: var(--white-40);
      margin-top: 5px;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    .sidebar-body {
      flex: 1;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }

    .field-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white-40);
      font-weight: 500;
      margin-bottom: 8px;
    }

    #url-input {
      width: 100%;
      padding: 11px 13px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.55;
      resize: none;
      outline: none;
      min-height: 82px;
      transition: border-color 0.15s;
    }

    #url-input:focus { border-color: var(--white-20); }
    #url-input::placeholder { color: var(--white-20); }

    .btn-red {
      width: 100%;
      padding: 12px 16px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-red:hover:not(:disabled) { opacity: 0.88; }
    .btn-red:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-ghost {
      width: 100%;
      padding: 11px 16px;
      background: transparent;
      color: var(--white-60);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-ghost:hover:not(:disabled) { border-color: var(--white-20); color: var(--white); }
    .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    .status-box {
      padding: 11px 13px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--white-20);
      flex-shrink: 0;
      margin-top: 4px;
      transition: background 0.2s;
    }

    .status-dot.active {
      background: var(--green);
      animation: pulse-dot 1.4s ease-in-out infinite;
    }

    .status-dot.error { background: var(--red); }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    #status-label {
      font-size: 12px;
      color: var(--white-40);
      line-height: 1.4;
      font-weight: 300;
    }

    .sidebar-footer {
      padding: 16px 22px;
      border-top: 1px solid var(--border);
    }

    .new-story-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: var(--white-40);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.01em;
    }

    .new-story-btn:hover { color: var(--white-60); border-color: var(--white-20); }

    /* ── MAIN PANEL ───────────────────────────────── */
    #main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── CONVERSATION ─────────────────────────────── */
    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 36px 44px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      scroll-behavior: smooth;
    }

    #conversation::-webkit-scrollbar { width: 3px; }
    #conversation::-webkit-scrollbar-track { background: transparent; }
    #conversation::-webkit-scrollbar-thumb { background: var(--white-10); border-radius: 2px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px;
      margin: auto;
    }

    .empty-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 56px;
      letter-spacing: 0.12em;
      color: var(--white-06);
      margin-bottom: 20px;
      user-select: none;
    }

    .empty-line {
      width: 28px;
      height: 2px;
      background: var(--red);
      opacity: 0.4;
      margin: 0 auto 16px;
    }

    .empty-desc {
      font-size: 14px;
      color: var(--white-40);
      font-weight: 300;
      line-height: 1.65;
      max-width: 280px;
    }

    /* Messages */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 820px;
      width: 100%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-role {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white-40);
      margin-bottom: 7px;
      font-weight: 500;
    }

    .msg-bubble {
      padding: 16px 20px;
      border-radius: 5px;
      font-size: 14px;
      line-height: 1.7;
      max-width: 100%;
      word-break: break-word;
    }

    .message.user .msg-bubble {
      background: var(--red-dim);
      border: 1px solid var(--red-border);
      color: var(--white-80);
    }

    .message.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--white);
      white-space: pre-wrap;
    }

    /* Streaming cursor */
    .stream-cursor {
      display: inline-block;
      width: 2px;
      height: 13px;
      background: var(--white-60);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── SLIDE CARDS ──────────────────────────────── */
    .slides-wrap {
      width: 100%;
      max-width: 820px;
    }

    .slides-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .slides-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--white-60);
    }

    .slides-count {
      font-size: 11px;
      color: var(--white-40);
      font-weight: 300;
    }

    .slides-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .copy-all-btn, .download-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--white-40);
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .copy-all-btn:hover, .download-btn:hover { border-color: var(--white-20); color: var(--white-60); }
    .copy-all-btn.copied { border-color: var(--green); color: var(--green); }

    .slides-summary {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--white-40);
    }

    .slides-summary-item { display: flex; align-items: center; gap: 5px; }
    .slides-summary-item strong { color: var(--white-60); font-weight: 500; }
    .slides-summary-warn { color: #f87171; }

    .slides-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .slide-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 18px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s;
      position: relative;
    }

    .slide-card:hover { border-color: var(--white-10); }
    .slide-card:hover .slide-copy-btn { opacity: 1; }

    .slide-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .slide-num {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--red);
      opacity: 0.8;
    }

    .slide-meta {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slide-wordcount {
      font-size: 10px;
      color: var(--white-20);
      font-weight: 400;
    }

    .slide-wordcount.over { color: #f87171; }

    .slide-copy-btn {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      color: var(--white-40);
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .slide-copy-btn:hover { color: var(--white-80); border-color: var(--white-20); }
    .slide-copy-btn.copied { color: var(--green); border-color: var(--green); opacity: 1; }

    .slide-text {
      font-family: 'Instrument Serif', serif;
      font-size: 14.5px;
      line-height: 1.7;
      color: var(--white);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── TITLE CARDS ─────────────────────────────── */
    .titles-wrap {
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .title-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: border-color 0.15s;
    }

    .title-card:hover { border-color: var(--white-10); }

    .title-card-left {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .title-num {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--red);
      opacity: 0.8;
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }

    .title-text {
      font-size: 14px;
      color: var(--white-80);
      line-height: 1.5;
    }

    .use-title-btn {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--white-40);
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .use-title-btn:hover { border-color: var(--red-border); color: var(--red); }

    /* ── INPUT AREA ───────────────────────────────── */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 18px 44px 22px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
    }

    #chat-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 130px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #chat-input:focus { border-color: var(--white-20); }
    #chat-input::placeholder { color: var(--white-20); }
    #chat-input:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn {
      padding: 12px 20px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
      height: 48px;
    }

    #send-btn:hover:not(:disabled) { opacity: 0.88; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .input-hint {
      font-size: 11px;
      color: var(--white-20);
      margin-top: 6px;
      padding: 0 2px;
    }

    /* Spinner for generate button */
    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────── -->

  const INSTRUCTIONS = `You transform articles about successful founders into Instagram stories. Default word limit: 50 words per slide. Never ask the user to confirm this. Never fabricate facts. If unverifiable, leave it out. Evaluate the strongest angle independently — don't default to the user's framing, but don't reject it either. Judge purely on mass audience appeal. Before writing slides, internalise the gold-standard examples in your knowledge base. Match their tone, structure, rhythm, and transitions.

RULES: Never rely solely on the user's URL or article. Always conduct independent tool research to verify key facts from at least one additional reputable source before use. Only add external facts confirmed by tools or cited sources. If sources disagree, state the range. Use tools by default for: founder identity, timeline, funding, valuation, revenue, ARR, users, acquisitions. Only reputable sources. Avoid redundant tool calls.

STYLE: Third person with occasional light asides. Short punchy sentences — one idea per line; break across 2–3 lines for rhythm. Present tense for drama. Digits for ALL numbers ("$61M", "30,000 users"). No emojis, hashtags, over-exclamation, or hedge words. Light ellipses for suspense. Front-load the largest verifiable stat. Hooks must be validated by later slides. Leverage big-name investors/endorsements where available. Default to clean, punchy, factual prose. Use vivid and visceral language selectively — only at high-drama beats (sacrifice, sharp contrast, pivotal turning point) where it genuinely elevates the story. Never use jargon, buzzwords, or abstract language ("enterprise platform", "scalable solution"). Write like a human telling a story, not a press release.

HOOK RULE: Every non-final slide must end with a hook WOVEN INTO the body text — the natural final 5–15 words. NOT a bolted-on signpost. Techniques: cliffhanger ("Then came the line that would change his life forever…"), unanswered question ("For most, a win like that is enough. Not for Hearn…"), half-revealed fact, temporal jump, pivot opening a new thread. These flow naturally from the content above.

TRANSITIONS: Each slide hands off seamlessly using: temporal bridges, tension bridges, contrast bridges, or zoom shifts. Never use the same type consecutively.

SIGNATURE PATTERNS:
- The Founded Pivot: Use once per story — "For most, that would be enough. Not for [Name]…" or a variation.
- The Callback Close: Final slide MUST tie back to opening or origin. E.g., opens with "digging holes" → closes with "Not bad for a guy who started out digging holes in roads."
- The "Then" Turn: Find the pivotal moment where trajectory shifts. "Then COVID hit." Place it where it has maximum impact.

RHYTHM: Short. Short. Medium. Short. Two punchy fragments, one slightly longer line, snap back short.

WORKFLOW (never skip, never jump ahead):
1. silent_research → 2. user_feedback (2 sub-steps) → 3. reflection → 4. assembly
Reset: on "Restart entire workflow" or equivalent, forget all context and restart.

PHASE 1 — SILENT RESEARCH (invisible to user, NO output)

## TITLE SCORING FRAMEWORK (5 Criteria, Max 50 Points)

3. **Contrast or Tension** /10 — Is there a gap or surprise creating irresistible pull? (9–10: gap feels impossible but true. 6–8: present but predictable. Below 6: flat statement with no tension.)
4. **Identity Clarity** /10 — Do you know who and what this is about within the first few words? (9–10: vivid, loaded descriptor — instantly human. 6–8: clear but generic. Below 6: buried or missing.)
5. **Swipe Urgency** /10 — Does it create an almost physical need to keep reading? (9–10: stacks two or more compelling hooks — a scale or speed element AND a paradox, intrigue qualifier, or vivid concept — so the reader must swipe to resolve what they've just read. 7–8: one strong hook but built around a single element. Below 7: reads like a headline, not a hook. NOTE: a title that isolates one good element while another title isolates a different good element scores no higher than 7, regardless of how strong that element is — the job is to combine them.)

## VIVID & VISCERAL WRITING GUIDE
Default to clean, punchy, factual prose. Use vivid and visceral language selectively — deploy it only at high-drama beats where it genuinely elevates and adds flair and impact: a moment of sacrifice, a sharp visual contrast, a pivotal turning point, an origin detail that makes the reader picture the scene. Do not force sensory language onto slides where it doesn't earn its place. Most slides will be clean and factual. A few will be visceral. That contrast is what gives the visceral moments their power.

### When to reach for vivid/visceral language (high-drama beats only):
- The origin scene — landing in a new country, a formative early moment, a physical detail that makes the person real
- The sacrifice or going-all-in moment — quitting, betting everything, a decision that felt irrational
- The contrast that defines the gap — "digging holes" vs. "$1.2B", "washing dishes" vs. "$12B empire"
- A single visual beat that crystallises the person's character

## RESEARCH VALIDATION PROTOCOL (Silent — runs before any output)

**HARDLINE RULE:** Hallucinated or unverified information is never acceptable — not in titles, not in slides, not anywhere. A story built on false data destroys credibility and trust. When in doubt, leave it out.

**WIDER RESEARCH REQUIREMENT:** Never rely solely on the URL or article the user provides. Always conduct independent research using tools to cross-check and verify key claims — especially numbers, dates, valuations, funding rounds, and named facts — against at least one additional reputable external source. The user's source is a starting point, not the final word.

Before presenting any information to the user, run this silent internal check on every fact, figure, date, and named claim:

1. **Wider research check** — Have I searched independently beyond the user's source to verify this claim? A fact only from the user's article is not yet confirmed. Find a second reputable source before using it.
2. **Source check** — Is this claim confirmed by a reputable tool result or cited source? If not, do not use it.
3. **Conflict check** — If sources disagree, have I noted the range (e.g. "$8B–$13B") rather than asserting one figure as definitive?
4. **Fabrication check** — Have I invented, estimated, or extrapolated any figure and dressed it up as a verified fact? If yes, remove it.
5. **Exaggeration check** — Have I inflated any number, compressed any timeline, or overstated any claim to make the story more dramatic? If yes, correct it.

**This applies to titles too.** Every stat, name, and claim in a title must be verified through independent research — not assumed from the user's source alone. A title built on a false number is worse than no title.

**Rule:** If a fact cannot pass all five checks, it gets omitted, stated with explicit uncertainty, or held until a better source is found. Never guess. Never round up. Never present an unconfirmed figure as confirmed.

**Why this matters:** The strength of every Founded story rests entirely on its credibility. One fabricated or exaggerated stat destroys trust — in the story, in the brand, and in every story that follows. Verified facts, even modest ones, are always stronger than impressive-sounding invented ones.

## PATTERN ANALYSIS: What Makes These Stories Work

### 1. Hooks Are Woven In, Not Bolted On
Bad (bolted on): "Sales hit $214M. Fast-forward to the next chapter…"
Good (woven in): "For most, a win like that is enough to retire. Not for Hearn…"

The hook is the LAST BEAT of the slide's body text. It feels like the natural end of a thought that just happens to be incomplete. The reader swipes because the sentence demands resolution, not because a signpost told them to.

### 2. Each Slide Is a Breath, Not a Chapter
Slides are SHORT. 20–50 words. They feel like one exhale of a story being told out loud. When you read them, you hear a voice — pausing at line breaks, speeding through short fragments, landing on the final hook.

### 3. The Rhythm: Short. Short. Medium. Short.
Two punchy fragments. One slightly longer line. Snap back short. This creates forward momentum. Example:
"Rain, wind, and passing traffic.
He was out there.
Learning what sells, what doesn't, and how it feels when nobody buys.
Four years pass by..."

### 4. Line Breaks Are Dramatic Pauses
Line breaks don't follow grammar rules — they follow SPEECH rhythm. Break where you'd pause if telling this story out loud. Break before a reveal. Break to isolate a number. Break to let a contrast land.

### 5. Contrast Creates the Story
Every great Founded story has a gap: where they started vs. where they ended up. The wider the gap, the better the story. Surface it in Slide 1, echo it throughout, pay it off in the final slide.
- "$2 room at the YMCA" → "$13 billion empire"
- "Digging holes in roads" → "$1.2 billion sale"
- "Laid off from factory job" → "$975M exit"

### 6. Numbers Are Proof
Numbers signal truth. They stop the scroll. Always use digits. Always use the most specific number available. "$214M" not "over $200 million". "130 people" not "over a hundred". "£4,000-a-term" not "expensive school fees".

### 7. The Pivot Line
Almost every story has a variation of: "For most, that would be enough. Not for [Name]." This is the Founded signature move — it creates contrast between the ordinary response and the founder's extraordinary one. Use it once per story, never more.

### 8. The Callback Close
The final slide ties back to the opening or the origin. It creates a satisfying loop:
- Opens with "digging holes" → Closes with "Not bad for a guy who started out digging holes in roads."
- Opens with "$2 room at YMCA" → Closes with "From a $2 room at the YMCA to a multibillion-dollar empire."
- Opens with "laid off" → Closes with "From laid off… to near $1B… in six years."

### 9. Minimum Viable Slide Count
Use as few slides as the story demands. The goal is the shortest version that preserves the full narrative arc — not the most comfortable length. If 9 slides tell the complete story, use 9. Never add a slide to fill space or ease a transition. Every slide must be irreplaceable. When in doubt, cut.

### 10. The "Then" Turn
Many stories have a pivotal "Then" slide that shifts the entire trajectory. It usually comes after the initial success and signals that the REAL story is about to happen:
- "Then Shahid did the thing dishwashers aren't supposed to do…"
- "Then COVID hit."
- "Then Red Lobster came calling."

## COMMON MISTAKES TO AVOID

1. **Bolted-on hooks**: "What happens next will surprise you..." or "Stay tuned..." — these kill the flow. The hook must be organic.
2. **Telling the reader how to feel**: "This is incredible." "What an amazing journey." — let the facts do the emotional work.
3. **Over-explaining**: "Huel, which stands for Human Fuel, is a nutritionally complete meal replacement product..." — too much explanation kills momentum. Keep it punchy.
4. **Generic descriptors**: "successful entrepreneur", "innovative company", "game-changing product" — these mean nothing. Use specific facts instead.
5. **Rigid 10-slide structure**: Don't force the story into exactly 10 slides if it needs more. Don't pad to 14 if 11 is perfect.
6. **Ignoring the callback**: The final slide MUST connect back to the beginning or the origin story. It's the signature move.
7. **Flat Slide 2**: If Slide 2 doesn't make the reader physically unable to stop, the whole story fails. It's the most important slide after the title.
8. **Missing the "Then" turn**: The best stories have a moment where the trajectory shifts — "Then COVID hit." "Then Shahid did the thing dishwashers aren't supposed to do…" Look for this beat in every story.
9. **Treating temporal signposts as hooks**: "Fast-forward to 2024…" is a transition device, not a hook. A hook is: "For most, that'd be enough. Not for [Name]…"
10. **Same energy on every slide**: Vary the emotional register. Some slides should be punchy and fast. Some should breathe. Some should be just one devastating line.`;

          'content-type': 'application/json',
          'x-api-key': CONFIG.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: CONFIG.model,
          max_tokens: CONFIG.maxTokens,
          system: SYSTEM_PROMPT,
          messages: apiMessages,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          stream: true
        })
      });

      if (!res.ok) {
        let errMsg = `API error ${res.status}`;
        try { const j = await res.json(); errMsg = j.error?.message || errMsg; } catch(e) {}
        throw new Error(errMsg);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      // Track all content blocks so the assistant message stored in history
      // is the full content array (required when tool_use blocks are present)
      let contentBlocks = [];
      let activeBlockIdx = -1;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const evt = JSON.parse(data);

            // New content block starting
            if (evt.type === 'content_block_start') {
              activeBlockIdx = evt.index;
              const blockType = evt.content_block?.type;
              if (blockType === 'text') {
                contentBlocks[activeBlockIdx] = { type: 'text', text: '' };
              } else if (blockType === 'tool_use') {
                contentBlocks[activeBlockIdx] = {
                  type: 'tool_use',
                  id: evt.content_block.id,
                  name: evt.content_block.name,
                  input: {}
                };
                setStatus('Researching article…', 'active');
              }
            }

            // Content delta
            if (evt.type === 'content_block_delta') {
              if (evt.delta?.type === 'text_delta') {
                const chunk = evt.delta.text;
                fullText += chunk;
                if (contentBlocks[evt.index]) contentBlocks[evt.index].text += chunk;
                updateStreaming(streamEl, fullText);
              }
              // input_json_delta is for tool inputs — ignore for display
            }
          } catch(e) {}
        }
      }

      finalizeMessage(streamEl, fullText);

      // Store the full content array in history (handles tool_use blocks correctly)
      const assistantContent = contentBlocks.filter(Boolean);
      apiMessages.push({
        role: 'assistant',
        content: assistantContent.length === 1 && assistantContent[0].type === 'text'
          ? assistantContent[0].text
          : assistantContent
      });

      setStatus('Ready', 'idle');

    } catch (err) {
      const bubble = streamEl.querySelector('.msg-bubble');
      if (bubble) {
        bubble.textContent = `Error: ${err.message}`;
        bubble.style.color = '#FF3C3A';
      }
      setStatus('Error — check console', 'error');
      console.error('Founded API error:', err);
    }

    setLoading(false);
  }

  // ── ACTIONS ─────────────────────────────────────────────
  async function handleGenerate() {
    const url = document.getElementById('url-input').value.trim();
    if (!url || isLoading) return;

    workflowPhase = 'titles';
    currentArticleUrl = url;
    titleMessages = [];
    apiMessages = [];

    const conv = document.getElementById('conversation');
    conv.innerHTML = '';

    const userMsg = `Here's the article: ${url}`;
    titleMessages.push({ role: 'user', content: userMsg });
    addUserMessage(userMsg);

    await callTitlesAPI();
  }

  async function handleTitleConfirm(titleText) {
    if (isLoading) return;

    workflowPhase = 'slides';

    addUserMessage(`Use this title: ${titleText}`);

    // Bootstrap the slides conversation so the model sees title selection as already complete.
    // This prevents it from restarting the workflow from Phase 1.
    apiMessages = [
      { role: 'user', content: `Here's the article: ${currentArticleUrl}` },
      {
        role: 'assistant',
        content: `I've researched the article and generated title options. Here are 5 synthesis titles:\n\n1. ${titleText}\n\nWhich title would you like to use?`
      },
      { role: 'user', content: `Use this title: ${titleText}` }
    ];

    await callAPI();
  }

  async function handleRegenerate() {
    if (isLoading) return;

    if (workflowPhase === 'titles') {
      if (titleMessages.length < 2) return;
      if (titleMessages[titleMessages.length - 1]?.role === 'assistant') titleMessages.pop();
      const conv = document.getElementById('conversation');
      const allAssistant = conv.querySelectorAll('.message.assistant');
      if (allAssistant.length > 0) allAssistant[allAssistant.length - 1].remove();
      await callTitlesAPI();
    } else {
      if (apiMessages.length < 2) return;
      if (apiMessages[apiMessages.length - 1]?.role === 'assistant') apiMessages.pop();
      const conv = document.getElementById('conversation');
      const allAssistant = conv.querySelectorAll('.message.assistant');
      if (allAssistant.length > 0) allAssistant[allAssistant.length - 1].remove();
      await callAPI();
    }
  }

  async function handleSend() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';

    addUserMessage(text);

    if (workflowPhase === 'titles') {
      titleMessages.push({ role: 'user', content: text });
      await callTitlesAPI();
    } else {
      apiMessages.push({ role: 'user', content: text });
      await callAPI();
    }
  }

  // ── EVENT LISTENERS ─────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    // Chat input: auto-resize + Enter to send
    const chatInput = document.getElementById('chat-input');
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 130) + 'px';
    });
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });

    // Login: Enter key
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryLogin();
    });
    document.getElementById('login-username').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-password').focus();
    });
  });
